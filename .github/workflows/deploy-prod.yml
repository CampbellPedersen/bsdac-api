name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Explicit image tag override
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  FRONTEND_REPOSITORY: bsdac-frontend
  BACKEND_REPOSITORY: bsdac-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy on EC2 via SSM
        run: |
          command_id="$(
            aws ssm send-command \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name AWS-RunShellScript \
              --comment "Deploy BSDAC images ${IMAGE_TAG}" \
              --query 'Command.CommandId' \
              --output text \
              --parameters commands='[
                "set -euxo pipefail",
                "REPO_URL=https://github.com/'"${{ github.repository }}"'.git",
                "mkdir -p /opt",
                "if [ ! -d /opt/bsdac/.git ]; then rm -rf /opt/bsdac && git clone \"$REPO_URL\" /opt/bsdac; fi",
                "cd /opt/bsdac",
                "git remote set-url origin \"$REPO_URL\"",
                "git fetch --depth 1 origin '"$GITHUB_SHA"'",
                "git checkout --force '"$GITHUB_SHA"'",
                "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"$AWS_ACCOUNT_ID"'.dkr.ecr.'"$AWS_REGION"'.amazonaws.com",
                "LOGIN_EMAIL=$(aws ssm get-parameter --region '"$AWS_REGION"' --name /bsdac/prod/LOGIN_EMAIL --with-decryption --query Parameter.Value --output text)",
                "LOGIN_PASSWORD_SHA256=$(aws ssm get-parameter --region '"$AWS_REGION"' --name /bsdac/prod/LOGIN_PASSWORD_SHA256 --with-decryption --query Parameter.Value --output text)",
                "DYNAMODB_TABLE_NAME=$(aws ssm get-parameter --region '"$AWS_REGION"' --name /bsdac/prod/DYNAMODB_TABLE_NAME --query Parameter.Value --output text)",
                "S3_BUCKET_NAME=$(aws ssm get-parameter --region '"$AWS_REGION"' --name /bsdac/prod/S3_BUCKET_NAME --query Parameter.Value --output text)",
                "cd /opt/bsdac/deploy",
                "AWS_ACCOUNT_ID='"$AWS_ACCOUNT_ID"' AWS_REGION='"$AWS_REGION"' IMAGE_TAG='"$IMAGE_TAG"' LOGIN_EMAIL=\"$LOGIN_EMAIL\" LOGIN_PASSWORD_SHA256=\"$LOGIN_PASSWORD_SHA256\" DYNAMODB_TABLE_NAME=\"$DYNAMODB_TABLE_NAME\" S3_BUCKET_NAME=\"$S3_BUCKET_NAME\" docker compose -f docker-compose.prod.yml pull",
                "AWS_ACCOUNT_ID='"$AWS_ACCOUNT_ID"' AWS_REGION='"$AWS_REGION"' IMAGE_TAG='"$IMAGE_TAG"' LOGIN_EMAIL=\"$LOGIN_EMAIL\" LOGIN_PASSWORD_SHA256=\"$LOGIN_PASSWORD_SHA256\" DYNAMODB_TABLE_NAME=\"$DYNAMODB_TABLE_NAME\" S3_BUCKET_NAME=\"$S3_BUCKET_NAME\" docker compose -f docker-compose.prod.yml up -d"
              ]'
          )"

          wait_exit_code=0
          aws ssm wait command-executed \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" || wait_exit_code=$?

          status="$(
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'StatusDetails' \
              --output text
          )"

          stdout="$(
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'StandardOutputContent' \
              --output text
          )"

          stderr="$(
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text
          )"

          printf '%s\n' "$stdout"
          if [ "$stderr" != "None" ] && [ -n "$stderr" ]; then
            printf '%s\n' "$stderr" >&2
          fi

          if [ "$status" != "Success" ] || [ "$wait_exit_code" -ne 0 ]; then
            echo "SSM deploy failed with status: $status" >&2
            exit 1
          fi
