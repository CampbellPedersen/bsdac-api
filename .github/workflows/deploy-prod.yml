name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Explicit image tag override
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  FRONTEND_REPOSITORY: bsdac-frontend
  BACKEND_REPOSITORY: bsdac-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.FRONTEND_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.BACKEND_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy on EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy BSDAC images ${IMAGE_TAG}" \
            --parameters "{\"commands\":[\"cd /opt/bsdac/deploy\",\"AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID AWS_REGION=$AWS_REGION IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull\",\"AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID AWS_REGION=$AWS_REGION IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d\"]}"
