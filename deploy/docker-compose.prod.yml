services:
  caddy:
    image: caddy:2.9
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  frontend:
    build:
      context: ../client
    restart: unless-stopped

  backend:
    build:
      context: ../server
    env_file:
      - .env
    environment:
      SERVICE_PORT: "80"
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
